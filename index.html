<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">

    <title>DinMaurice</title>

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/a2e0e6ad65.js" crossorigin="anonymous"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            position:relative;

            background: linear-gradient(
                -45deg,
                #000000,
                #120018,
                #250038,
                #4b0082,
                #1a001f,
                #000000
            );

            background-size:400% 400%;

            /* Langsamere Animation */
            animation:gradientFlow 25s ease infinite;
        }

        /* Hintergrund Wellen */
        @keyframes gradientFlow{
            0%{
                background-position:0% 50%;
            }

            50%{
                background-position:100% 50%;
            }

            100%{
                background-position:0% 50%;
            }
        }

        /* Glow Layer */
        body::before{
            content:"";
            position:absolute;

            width:100%;
            height:100%;

            background:
                radial-gradient(circle at 20% 30%, rgba(128,0,255,0.25), transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(180,0,255,0.2), transparent 35%),
                radial-gradient(circle at 50% 50%, rgba(90,0,180,0.15), transparent 40%);

            filter:blur(100px);

            animation:pulse 15s ease-in-out infinite;

            z-index:-2;
        }

        @keyframes pulse{
            0%{
                transform:scale(1);
            }

            50%{
                transform:scale(1.08);
            }

            100%{
                transform:scale(1);
            }
        }

        /* Kleine Partikel */
        .particles{
            position:absolute;
            width:100%;
            height:100%;
            overflow:hidden;
            z-index:-1;
        }

        .particles span{
            position:absolute;
            display:block;

            width:4px;
            height:4px;

            background:rgba(255,255,255,0.5);

            border-radius:50%;

            animation:float 15s linear infinite;
        }

        @keyframes float{
            0%{
                transform:translateY(100vh) scale(0);
                opacity:0;
            }

            10%{
                opacity:1;
            }

            100%{
                transform:translateY(-10vh) scale(1);
                opacity:0;
            }
        }

        /* Card */
        .card{
            width:420px;

            background:rgba(20,20,20,0.55);

            backdrop-filter:blur(15px);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:30px;

            padding:40px;

            text-align:center;

            color:white;

            box-shadow:0 0 30px rgba(0,0,0,0.5);

            z-index:2;
        }

        .avatar{
            width:120px;
            height:120px;

            border-radius:50%;

            object-fit:cover;

            border:4px solid rgba(255,255,255,0.12);

            margin-bottom:20px;
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
        }

        .bio{
            color:#cfcfcf;
            font-size:18px;
            margin-bottom:35px;
        }

        /* Social Links */
        .links{
            display:flex;
            justify-content:center;
            gap:25px;

            margin-bottom:40px;
        }

        .links a{
            width:70px;
            height:70px;

            display:flex;
            justify-content:center;
            align-items:center;

            border-radius:20px;

            background:rgba(255,255,255,0.05);

            transition:0.3s;

            text-decoration:none;
        }

        .links a:hover{
            transform:translateY(-5px) scale(1.08);

            background:rgba(255,255,255,0.12);

            box-shadow:0 0 20px rgba(128,0,255,0.45);
        }

        .links i{
            font-size:34px;
            color:white;
        }

        .about h2{
            font-size:34px;
            margin-bottom:20px;
        }

        .about p{
            color:#d0d0d0;
            line-height:1.7;
            font-size:17px;
        }

    </style>

</head>

<body>

   <!-- MUSIC BUTTON -->
<div class="music-container">

    <a class="music-btn" onclick="toggleMusic()">
        <img src="play.svg" id="musicIcon" class="icon">
    </a>

</div>

<audio id="bg-music" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>


<script>

    let playing = false;
    
    function toggleMusic(){
    
        const music = document.getElementById("bg-music");
        const icon = document.getElementById("musicIcon");
    
        if(!playing){
    
            music.play();
    
            icon.src = "pause.svg";
    
            playing = true;
    
        }else{
    
            music.pause();
    
            icon.src = "play.svg";
    
            playing = false;
        }
    }
    
    </script>
